<!-- Обязателен для мобильной вёрстки: на GitHub Pages его никто не вставит за нас
     (на GAS это делал addMetaTag; дубль безвреден) -->
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Учёт времени</title>
<!-- URL страницы содержит подписанный токен — не отдаём его в Referer внешним хостам -->
<meta name="referrer" content="no-referrer">
<!-- SRI намеренно отсутствует: Telegram обновляет этот скрипт на месте (evergreen),
     integrity-хэш сломал бы приложение при обновлении; все вызовы Telegram.* в try/catch -->

<style>
  :root{
    --bg:#eef1f7; --card:#ffffff; --text:#101828; --muted:#667085;
    --primary:#4f46e5; --primary2:#3b82f6; --green:#12b76a; --amber:#f79009;
    --red:#f04438; --ring:#e4e7ec;
    --r:20px; --shadow:0 1px 2px rgba(16,24,40,.05),0 8px 24px rgba(16,24,40,.07);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:var(--bg);color:var(--text);padding-bottom:92px}
  .ic{width:20px;height:20px;stroke:currentColor;stroke-width:2;fill:none;
    stroke-linecap:round;stroke-linejoin:round;flex:none}

    color:#fff;padding:20px 18px 50px;border-radius:0 0 30px 30px}
  .hrow{display:flex;align-items:center;gap:12px}
  .ava{width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.22);
    display:flex;align-items:center;justify-content:center;font-weight:800;font-size:17px;
    border:2px solid rgba(255,255,255,.35);overflow:hidden;cursor:pointer;flex:none}
  .ava img{width:100%;height:100%;object-fit:cover}
  .who{flex:1;min-width:0}
  .hi{font-size:12px;opacity:.8;text-transform:capitalize}
  .nm{font-size:18px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .lsw{display:flex;gap:3px;background:rgba(255,255,255,.16);border-radius:999px;padding:3px}
  .lsw button{border:0;background:transparent;color:#fff;font-weight:800;font-size:11px;
    padding:5px 9px;border-radius:999px;cursor:pointer;opacity:.65}
  .lsw button.on{background:#fff;color:#4338ca;opacity:1}

  .wrap{padding:0 14px;margin-top:-28px}
  .card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);
    border:1px solid rgba(16,24,40,.05);padding:18px;margin-bottom:14px}
  .vacArt{width:100%;display:block;border-radius:14px;margin-bottom:14px}

  /* Страницы */
  .page{display:none}
  .page.on{display:block;animation:up .25s ease}
  @keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

  /* Кольцо-таймер */
  .ringWrap{display:flex;flex-direction:column;align-items:center;padding:6px 0 2px}
  .ringBox{position:relative;width:172px;height:172px}
  .ringBox svg{transform:rotate(-90deg)}
  .ringBg{stroke:var(--ring)}
  .ringFg{stroke:var(--green);transition:stroke-dashoffset .6s ease,stroke .3s}
  .ringIn{position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:2px}
  .timer{font-size:34px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:.5px}
  .tsub{font-size:12px;color:var(--muted)}
  .pill{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:800;
    padding:6px 13px;border-radius:999px;margin-top:10px}
  .pill .dot{width:7px;height:7px;border-radius:50%}
  .st-none{background:#f2f4f7;color:var(--muted)} .st-none .dot{background:#98a2b3}
  .st-open{background:#d1fadf;color:#027a48} .st-open .dot{background:var(--green)}
  .st-lunch{background:#fef0c7;color:#b54708} .st-lunch .dot{background:var(--amber)}

  /* Кнопки: компактные, мягкие пастельные градиенты, милые иконки-стикеры */
  .btn{position:relative;overflow:hidden;display:flex;align-items:center;gap:11px;
    width:100%;border:0;border-radius:16px;padding:11px 14px;font-size:14.5px;
    font-weight:800;letter-spacing:.2px;cursor:pointer;margin-top:10px;color:#fff;
    transition:transform .08s,box-shadow .25s,filter .2s}
  .btn::before{content:'';position:absolute;left:0;right:0;top:0;height:50%;
    background:linear-gradient(rgba(255,255,255,.22),rgba(255,255,255,.02));
    border-radius:16px 16px 40px 40px;pointer-events:none}
  .btn:active{transform:scale(.97);filter:brightness(.96)}
  .btn .bic{width:34px;height:34px;border-radius:11px;flex:none;overflow:hidden;
    background:rgba(255,255,255,.35);display:flex;align-items:center;justify-content:center;
    box-shadow:0 2px 5px rgba(0,0,0,.12)}
  .btn .bic .ic{width:18px;height:18px}
  .btn .bic img{width:100%;height:100%;object-fit:cover}
  .tab .tic{width:26px;height:26px;border-radius:9px;object-fit:cover}
  .btn .lbl{flex:1;text-align:left}
  .btn .chev{width:16px;height:16px;opacity:.7}
  .b-green{background:linear-gradient(145deg,#6ee7b7 0%,#34d399 50%,#10b981 100%);
    box-shadow:0 8px 18px -8px rgba(16,185,129,.5)}
  .b-amber{background:linear-gradient(145deg,#fcd34d 0%,#fbbf24 50%,#f59e0b 100%);
    box-shadow:0 8px 18px -8px rgba(245,158,11,.45)}
  .b-red{background:linear-gradient(145deg,#fda4af 0%,#fb7185 50%,#f43f5e 100%);
    box-shadow:0 8px 18px -8px rgba(244,63,94,.45)}
  .b-blue{background:linear-gradient(145deg,#a5b4fc 0%,#818cf8 50%,#6366f1 100%);
    box-shadow:0 8px 18px -8px rgba(99,102,241,.5)}
  .b-ghost{background:#f2f4f7;color:var(--text);box-shadow:none}
  .b-ghost::before{display:none}
  .btn.simple{justify-content:center}
  .btn.simple .lbl{flex:none;text-align:center}
  /* Тонкая полоса фоновой синхронизации (вместо блокирующего спиннера) */
  .sync{position:fixed;top:0;left:0;right:0;height:3px;z-index:70;
    background:linear-gradient(90deg,#818cf8,#6366f1,#a5b4fc);opacity:0;
    transform-origin:left;transition:opacity .2s}
  .sync.on{opacity:1;animation:syncbar 1.1s ease-in-out infinite}
  @keyframes syncbar{0%{transform:scaleX(0)}60%{transform:scaleX(.85)}100%{transform:scaleX(1);opacity:.4}}
  /* Скелетон холодного старта (без кэша): пульс на имени/кольце/статусе
     вместо блокирующего оверлея; снимается первым render() */
  body.booting #name,body.booting .ringBox,body.booting #pill{
    animation:skel 1.15s ease-in-out infinite}
  @keyframes skel{0%,100%{opacity:.35}50%{opacity:.85}}

  /* Статы */
  .stats{display:flex;gap:10px}
  .stat{flex:1;background:#f8fafc;border-radius:15px;padding:12px 8px;text-align:center}
  .stat .sic{width:30px;height:30px;border-radius:10px;margin:0 auto 6px;
    display:flex;align-items:center;justify-content:center}
  .stat .sic .ic{width:16px;height:16px}
  .s1 .sic{background:#e0e7ff;color:#4f46e5}
  .s2 .sic{background:#d1fadf;color:#027a48}
  .s3 .sic{background:#fef0c7;color:#b54708}
  .stat .v{font-size:15px;font-weight:800}
  .stat .l{font-size:10px;color:var(--muted);text-transform:uppercase;margin-top:2px;letter-spacing:.3px}

  h3{font-size:15px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
  h3 .ic{color:var(--primary)}

  /* Отпуск */
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
  .chip{padding:9px 15px;border-radius:999px;background:#f2f4f7;font-size:13px;
    font-weight:700;border:1.5px solid transparent;cursor:pointer;color:var(--muted);
    transition:transform .08s,box-shadow .2s}
  .chip:active{transform:scale(.95)}
  .chip.on{background:linear-gradient(135deg,#6366f1,#8b5cf6);border-color:transparent;
    color:#fff;box-shadow:0 6px 14px -4px rgba(99,102,241,.55)}
  .dates{display:flex;gap:10px;margin-bottom:6px}
  .dates label{flex:1;font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:700}
  .dates input{width:100%;margin-top:5px;padding:12px 10px;border:1.5px solid #e4e7ec;
    border-radius:13px;font-size:15px;background:#f8fafc;font-family:inherit;
    transition:border-color .2s,box-shadow .2s}
  .dates input:focus,textarea:focus{outline:none;border-color:var(--primary);
    box-shadow:0 0 0 3px rgba(79,70,229,.15)}
  .days{font-size:13px;color:var(--primary);font-weight:800;margin:6px 0 8px;min-height:18px}
  textarea{width:100%;padding:12px;border:1.5px solid #e4e7ec;border-radius:13px;
    font-size:15px;font-family:inherit;background:#f8fafc;resize:none;height:64px}
  .fld{width:100%;margin-top:5px;padding:12px 10px;border:1.5px solid #e4e7ec;
    border-radius:13px;font-size:15px;background:#f8fafc;font-family:inherit;
    transition:border-color .2s,box-shadow .2s}
  .fld:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(79,70,229,.15)}
  .flbl{font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:700}
  .frow{display:flex;gap:10px;margin-bottom:6px}
  .frow>label{flex:1}
  .del{border:0;background:#fee4e2;color:#b42318;border-radius:9px;width:28px;height:28px;
    font-weight:800;cursor:pointer;flex:none;margin-left:8px}
  .srow{display:flex;align-items:center;background:#f8fafc;border-radius:13px;
    padding:10px 12px;font-size:13px;font-weight:600;justify-content:space-between}
  .srow.today{background:#e0e7ff}
  /* Коробочки статуса команды 2×2 */
  .tgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  .tbox{border-radius:14px;padding:12px 12px 10px;cursor:pointer;
    transition:transform .08s,box-shadow .15s}
  .tbox:active{transform:scale(.96)}
  .tbox.sel{box-shadow:inset 0 0 0 2px rgba(16,24,40,.28)}
  .tbox .n{font-size:24px;font-weight:800;line-height:1}
  .tbox .l{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;
    color:#475467;margin-top:5px}
  .plusbtn{margin-left:auto;width:28px;height:28px;border-radius:9px;border:0;flex:none;
    background:#eef2ff;color:#4338ca;font-size:17px;font-weight:800;cursor:pointer;line-height:1}
  .clearbtn{margin-left:auto;border:0;flex:none;background:#eef2ff;color:#4338ca;
    font-size:11.5px;font-weight:800;border-radius:9px;padding:7px 10px;cursor:pointer;
    line-height:1;transition:transform .08s}
  .clearbtn:active{transform:scale(.95)}
  .tsec{margin:12px 0 6px;font-size:11px;font-weight:800;text-transform:uppercase;
    letter-spacing:.4px;color:var(--muted);display:flex;align-items:center;gap:7px}
  .tsec:first-child{margin-top:0}
  .tdot{width:8px;height:8px;border-radius:50%;flex:none}
  .trows{display:flex;flex-direction:column;gap:6px}
  .srow.warn{background:#fef0c7}
  .nrow{display:flex;gap:10px;align-items:flex-start;background:#f8fafc;
    border-radius:13px;padding:11px 12px}
  .nico{width:30px;height:30px;border-radius:10px;background:#eef2ff;flex:none;
    display:flex;align-items:center;justify-content:center;font-size:15px}
  .ntx{flex:1;font-size:13px;line-height:1.35;min-width:0}
  .ntm{font-size:10.5px;color:var(--muted);margin-top:2px}
  .vcard{background:#f8fafc;border-radius:14px;padding:13px;margin-bottom:9px}
  .vcard .vt{font-weight:800;font-size:14px}
  .vcard .vp{font-size:13px;margin-top:2px}
  .vcard .vr{font-size:12px;color:var(--muted);margin-top:3px}
  .vcard .vw{font-size:12px;color:#b54708;margin-top:3px;font-weight:700}
  .btn2{flex:1;border:0;border-radius:12px;padding:11px;font-weight:800;font-size:13.5px;
    color:#fff;cursor:pointer;transition:transform .08s}
  .btn2:active{transform:scale(.96)}
  .btn2.ok{background:#12b76a}
  .btn2.no{background:#f04438}
  .tbadge{position:absolute;top:3px;right:16%;min-width:16px;height:16px;border-radius:8px;
    background:#f04438;color:#fff;font-size:10px;font-weight:800;display:none;
    align-items:center;justify-content:center;padding:0 4px}
  .tab{position:relative}
  .vlist{display:flex;flex-direction:column;gap:8px}
  .vrow{display:flex;justify-content:space-between;align-items:center;background:#f8fafc;
    border-radius:13px;padding:11px 13px;font-size:13px;font-weight:600}
  .vst{font-size:10px;font-weight:800;padding:4px 10px;border-radius:999px;letter-spacing:.3px}
  .vst.Pending{background:#fef0c7;color:#b54708}
  .vst.Approved{background:#d1fadf;color:#027a48}
  .vst.Declined{background:#fee4e2;color:#b42318}
  .empty{color:var(--muted);font-size:13px;text-align:center;padding:8px 0}

  /* Нижняя навигация */
  .tabbar{position:fixed;left:12px;right:12px;bottom:12px;background:rgba(255,255,255,.92);
    backdrop-filter:blur(12px);border-radius:20px;box-shadow:0 8px 30px rgba(16,24,40,.16);
    display:flex;padding:8px;z-index:40}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
    padding:8px 0;border-radius:14px;cursor:pointer;color:var(--muted);
    font-size:11px;font-weight:700;border:0;background:transparent;
    transition:background .2s,color .2s}
  .tab .ic{width:22px;height:22px}
  .tab.on{background:linear-gradient(135deg,#eef2ff,#ede9fe);color:#4338ca;
    box-shadow:inset 0 0 0 1px rgba(99,102,241,.25)}

  /* Оверлеи */
  .overlay{position:fixed;inset:0;background:rgba(16,24,40,.5);display:none;
    align-items:center;justify-content:center;z-index:50}
  .overlay.show{display:flex}
  .modal{background:#fff;border-radius:22px;padding:22px;width:86%;max-width:340px;text-align:center}
  .modal p{margin-bottom:14px;font-size:15px}
  .spin{width:38px;height:38px;border:4px solid #e0e7ff;border-top-color:var(--primary);
    border-radius:50%;animation:sp 1s linear infinite;margin:0 auto}
  @keyframes sp{to{transform:rotate(360deg)}}
  .toast{position:fixed;left:14px;right:14px;bottom:86px;background:#101828;color:#fff;
    padding:14px 16px;border-radius:14px;font-size:14px;opacity:0;transform:translateY(12px);
    transition:.25s;z-index:60;pointer-events:none}
  .toast.show{opacity:1;transform:none}
  .toast.err{background:var(--red)}
</style>
</head>

<svg style="display:none" xmlns="http://www.w3.org/2000/svg">

</svg>

  <div class="hdr">
    <div class="hrow">
      <div class="ava" id="ava">–</div>
      <div class="who">
        <div class="hi" id="date"></div>
        <div class="nm" id="name">…</div>
      </div>
      <div class="lsw">
        <button id="lru" onclick="setLang('ru')">RU</button>
        <button id="len" onclick="setLang('en')">EN</button>
      </div>
    </div>
  </div>

  <div class="wrap">

    <!-- Страница «Смена» -->
    <section class="page on" id="pgHome">
      <div class="card">
        <div class="ringWrap">
          <div class="ringBox">
            <svg width="172" height="172">
              <defs>
                <linearGradient id="gGreen" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0%" stop-color="#34d399"/><stop offset="100%" stop-color="#059669"/>
                </linearGradient>
                <linearGradient id="gAmber" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#d97706"/>
                </linearGradient>
              </defs>
              <circle class="ringBg" cx="86" cy="86" r="76" stroke-width="12" fill="none"/>
              <circle class="ringFg" id="ringFg" cx="86" cy="86" r="76" stroke-width="12" fill="none"
                stroke-linecap="round" stroke-dasharray="477.5" stroke-dashoffset="477.5"/>
            </svg>
            <div class="ringIn">
              <div class="timer" id="timer">–:––</div>
              <div class="tsub" id="tsub"></div>
            </div>
          </div>
          <span class="pill st-none" id="pill"><span class="dot"></span><span id="pillTx">…</span></span>
        </div>
        <div id="actions"></div>
      </div>

      <div class="card" id="schedCard" style="display:none">
        <h3><svg class="ic"><use href="#i-cal"/></svg><span id="hSched"></span></h3>
        <div class="vlist" id="schedList"></div>
      </div>

      <div class="card">
        <h3 style="margin-bottom:0"><svg class="ic"><use href="#i-cal"/></svg><span id="hExtra"></span>
          <button class="plusbtn" id="exPlus" onclick="toggleBox('extraForm','exPlus')">+</button></h3>
        <div id="extraForm" style="display:none">
          <label style="display:block;margin-top:10px"><span class="flbl" id="lExDate"></span>
            <input class="fld" type="date" id="exDate"></label>
          <div class="frow" style="margin-top:6px">
            <label><span class="flbl" id="lExStart"></span><input class="fld" type="time" id="exStart" value="09:00"></label>
            <label><span class="flbl" id="lExEnd"></span><input class="fld" type="time" id="exEnd" value="18:00"></label>
          </div>
          <input class="fld" type="text" id="exNote" maxlength="200">
          <button class="btn b-blue" id="exBtn" onclick="sendExtra()"></button>
        </div>
        <div class="vlist" id="exMine" style="margin-top:10px"></div>
      </div>

      <div class="card">
        <h3><svg class="ic"><use href="#i-chart"/></svg><span id="hHours"></span></h3>
        <div class="stats">
          <div class="stat s1"><div class="sic"><svg class="ic"><use href="#i-sun"/></svg></div>
            <div class="v" id="today">–</div><div class="l" id="lToday"></div></div>
          <div class="stat s2"><div class="sic"><svg class="ic"><use href="#i-cal"/></svg></div>
            <div class="v" id="week">–</div><div class="l" id="lWeek"></div></div>
          <div class="stat s3"><div class="sic"><svg class="ic"><use href="#i-clock"/></svg></div>
            <div class="v" id="shifts">–</div><div class="l" id="lShifts"></div></div>
        </div>
      </div>
    </section>

    <!-- Страница «Отпуск» -->
    <section class="page" id="pgVac">
      <div class="card">
        <!-- src ставится из JS при ПЕРВОМ открытии вкладки (setVacArt): в web-сборке
             vacArts — отдельные .webp-файлы, старт приложения их не скачивает -->
        <img class="vacArt" id="vacArtImg" alt="">
        <h3><svg class="ic"><use href="#i-plane"/></svg><span id="hVac"></span></h3>
        <div class="chips" id="types"></div>
        <div class="dates">
          <label><span id="lFrom"></span><input type="date" id="d1"></label>
          <label><span id="lTo"></span><input type="date" id="d2"></label>
        </div>
        <div class="days" id="days"></div>
        <textarea id="reason"></textarea>
        <button class="btn b-blue" id="vacBtn" onclick="sendVacation()"></button>
      </div>

      <div class="card">
        <h3><svg class="ic"><use href="#i-cal"/></svg><span id="hMyReq"></span></h3>
        <div class="vlist" id="vlist"></div>
      </div>
    </section>

    <!-- Страница «Лента»: уведомления сотрудника -->
    <section class="page" id="pgNtf">
      <div class="card">
        <h3><svg class="ic"><use href="#i-bell"/></svg><span id="hNtf"></span>
          <button class="clearbtn" id="ntfClearBtn" onclick="clearFeed()"></button></h3>
        <div class="vlist" id="ntfList"></div>
      </div>
    </section>

    <!-- Страница «Админ»: только информация и график.

      <div class="card">
        <h3><svg class="ic"><use href="#i-chart"/></svg><span id="hTeam"></span></h3>
        <div id="teamBox"></div>
      </div>

      <div class="card">
        <h3 style="margin-bottom:0"><svg class="ic"><use href="#i-cal"/></svg><span id="hAdm"></span>
          <button class="plusbtn" id="admFormPlus" onclick="toggleBox('admFormBox','admFormPlus')">+</button></h3>
        <div id="admFormBox" style="display:none">
          <label class="flbl" id="lAdmEmp" style="display:block;margin-top:12px"></label>
          <select class="fld" id="admEmp"></select>
          <div class="frow" style="margin-top:10px">
            <label><span class="flbl" id="lAdmFrom"></span><input class="fld" type="date" id="admFrom"></label>
            <label><span class="flbl" id="lAdmTo"></span><input class="fld" type="date" id="admTo"></label>
          </div>
          <div class="frow">
            <label><span class="flbl" id="lAdmStart"></span><input class="fld" type="time" id="admStart" value="09:00"></label>
            <label><span class="flbl" id="lAdmEnd"></span><input class="fld" type="time" id="admEnd" value="18:00"></label>
          </div>
          <input class="fld" type="text" id="admNote" maxlength="200">
          <label style="display:flex;align-items:center;gap:8px;margin-top:11px;font-size:13.5px;font-weight:700;cursor:pointer">
            <input type="checkbox" id="admExtraChk" style="width:18px;height:18px;accent-color:#4f46e5">
            <span id="lAdmExtra"></span>
          </label>
          <button class="btn b-blue" id="admBtn" onclick="admAssign()"></button>
        </div>
      </div>

      <div class="card">
        <h3 style="margin-bottom:0"><svg class="ic"><use href="#i-bell"/></svg><span id="hAnn"></span>
          <button class="plusbtn" id="annPlus" onclick="toggleBox('annBox','annPlus')">+</button></h3>
        <div id="annBox" style="display:none">
          <textarea id="annText" maxlength="1500" style="margin-top:12px;height:84px"></textarea>
          <button class="btn b-blue" id="annBtn" onclick="sendAnn()"></button>
          <div class="vlist" id="annList" style="margin-top:12px"></div>
        </div>
      </div>
      <div class="card">
        <h3 style="margin-bottom:0"><svg class="ic"><use href="#i-chart"/></svg><span id="hAdmList"></span>
          <button class="plusbtn" id="admListPlus" onclick="toggleBox('admListBox','admListPlus')">+</button></h3>
        <div id="admListBox" style="display:none">
          <div class="vlist" id="admList" style="margin-top:12px"></div>
        </div>
      </div>
    </section>
  </div>

  // На GAS scriptlets подставляют значения; на GitHub Pages остаются literal —
  // тогда берём uid/t из query-параметров персональной ссылки.
  // ВАЖНО: последовательность «меньше+вопрос» в коде шаблона нельзя писать
  // слитно даже в строке — парсер HtmlService примет её за скриптлет и
  // уронит evaluate() ошибкой «SyntaxError … MiniApp line 44».
  let UID = '<?= uid ?>', TOKEN = '<?= token ?>';
  if (UID.indexOf('<' + '?') === 0) {
    const q = new URLSearchParams(location.search);
    UID = q.get('uid') || '';
    TOKEN = q.get('t') || '';
  }
  const API_URL = 'https://script.google.com/macros/s/AKfycbxlpm4QtQyPuTDFmPo9l0mAWiZ86EgX3d_6JoDmaFn55sGWApGcKYJzOd95eiHf2q1uTg/exec';
  let S = null, vacType = null, timerInt = null, LNG = 'ru';
  const CIRC = 477.5; // 2πr, r=76

  /**
   * Единый RPC: внутри GAS — google.script.run; на внешнем хостинге — fetch
   * к JSON-API (тело text/plain строкой — simple request, без preflight).
   * Таймаут 12 с; ОДИН автоповтор — только для читающих api (сетевая ошибка/
   * таймаут). Мутации не повторяем никогда: риск двойного clock-in, у них
   * останется обычный err-путь (doAction сам откатывает optimistic-переход).
   */
  const RETRY_FNS = { appState: 1, appNotifs: 1, appAdminData: 1, appAvatar: 1 };
  const RPC_TIMEOUT_MS = 12000;
  function rpc(fn, args, ok, err){
    if (typeof google !== 'undefined' && google.script && google.script.run) {
      const r = google.script.run.withSuccessHandler(ok).withFailureHandler(err);
      r[fn].apply(r, args);
      return;
    }
    const map = {
      appState: function(a){ return { api:'state', uid:a[0], t:a[1], noava: a[2] ? 1 : 0 }; },
      appAction: function(a){ return { api:'action', uid:a[0], t:a[1], action:a[2], payload:a[3], lite: a[4] ? 1 : 0 }; },
      appSetLang: function(a){ return { api:'setlang', uid:a[0], t:a[1], lang:a[2] }; },
      appSetAvatar: function(a){ return { api:'setavatar', uid:a[0], t:a[1], image:a[2] }; },
      appAdminData: function(a){ return { api:'admindata', uid:a[0], t:a[1] }; },
      appAdminAddShift: function(a){ return { api:'adminadd', uid:a[0], t:a[1], payload:a[2] }; },
      appAdminDelShift: function(a){ return { api:'admindel', uid:a[0], t:a[1], key:a[2] }; },
      appAdminDecide: function(a){ return { api:'admindecide', uid:a[0], t:a[1], reqId:a[2], approve:a[3]?1:0, comment:a[4]||'' }; },
      appAdminRegDecide: function(a){ return { api:'adminreg', uid:a[0], t:a[1], empId:a[2], approve:a[3]?1:0 }; },
      appExtraRequest: function(a){ return { api:'extrareq', uid:a[0], t:a[1], payload:a[2] }; },
      appAdminExtraDecide: function(a){ return { api:'adminextra', uid:a[0], t:a[1], reqId:a[2], approve:a[3]?1:0 }; },
      appNotifs: function(a){ return { api:'notifs', uid:a[0], t:a[1] }; },
      appAdminAnnounce: function(a){ return { api:'announce', uid:a[0], t:a[1], text:a[2] }; },
      appEmpExtraRespond: function(a){ return { api:'exrespond', uid:a[0], t:a[1], batchId:a[2], accept:a[3]?1:0 }; },
      appAnnAck: function(a){ return { api:'annack', uid:a[0], t:a[1], annId:a[2] }; },
      appFeedClear: function(a){ return { api:'feedclear', uid:a[0], t:a[1] }; },
      appAvatar: function(a){ return { api:'avatar', uid:a[0], t:a[1] }; },
    };
    const body = JSON.stringify(map[fn](args)); // считаем один раз — повтор шлёт то же тело
    const attempt = function(retriesLeft){

    };

  // --- Лента уведомлений ---
  // Общий рендер ленты: ответы notifs, feedclear и поле feed decision-RPC
  // имеют одну форму {items, act}. Только textContent (данные из таблицы).
  let FEED = null; // последний payload ленты — для перерисовки при смене языка
  function renderFeed(res){
    FEED = res || { items: [] }; // каждый путь отрисовки обновляет кэш
    const list = document.getElementById('ntfList');
    list.innerHTML = '';
    if (!res || !res.items || !res.items.length) {
      const e2 = document.createElement('div');
      e2.className = 'empty'; e2.textContent = d().ntfEmpty;
      list.appendChild(e2);
    } else {
      res.items.forEach(function(x){
        const r = document.createElement('div');
        r.className = 'nrow';
        const ic2 = document.createElement('div');
        ic2.className = 'nico'; ic2.textContent = x.icon;
        const bx = document.createElement('div'); bx.className = 'ntx';
        const tx3 = document.createElement('div'); tx3.textContent = x.text;
        const tm3 = document.createElement('div');
        tm3.className = 'ntm'; tm3.textContent = x.ts;
        bx.appendChild(tx3); bx.appendChild(tm3);
        // Действие ещё актуально → кнопки прямо в записи ленты
        if (x.action && res.act && res.act[x.action]) {
          const acts = document.createElement('div');
          acts.className = 'frow';
          acts.style.marginTop = '8px';
          const mkB = function(cls, label, approve){
            const b = document.createElement('button');
            b.className = 'btn2 ' + cls; b.style.padding = '9px';
            b.textContent = label;
            b.onclick = function(){ ntfAct(x.action, approve); };
            acts.appendChild(b);
          };
          if (x.action.indexOf('annack:') === 0) {
            mkB('ok', d().ackBtn, true); // одна кнопка «Ознакомлен»
          } else if (x.action.indexOf('exask:') === 0) {
            mkB('ok', d().exYes, true);
            mkB('no', d().exNo, false);
          } else {
            mkB('ok', d().okBtn, true);
            mkB('no', d().noBtn, false);
          }
          bx.appendChild(acts);
        }
        r.appendChild(ic2); r.appendChild(bx);
        list.appendChild(r);
      });
    }
    // Лента на экране — непрочитанных больше нет. Перерисовка после смены
    // языка может идти с другой вкладки — тогда бейдж не трогаем.
    if (document.getElementById('pgNtf').classList.contains('on')) {
      if (S) { S.unreadNotifs = 0; cacheSave(S); }
      document.getElementById('ntfBadge').style.display = 'none';
    }

  function doClearFeed(){
    // Оптимистично: пустая лента и скрытый бейдж сразу, сервер догоняет в фоне
    const list = document.getElementById('ntfList');
    const prevNodes = [];
    while (list.firstChild) prevNodes.push(list.removeChild(list.firstChild));
    const e2 = document.createElement('div');
    e2.className = 'empty'; e2.textContent = d().ntfEmpty;
    list.appendChild(e2);
    document.getElementById('ntfBadge').style.display = 'none';

    syncOn(true);
    rpc('appFeedClear', [UID, TOKEN], function(res){
      syncOn(false);
      renderFeed(res); // форма как у notifs: pending-элементы легитимно вернутся
      toast(d().ntfCleared);
    }, function(e){
      // Старый сервер (unknown api) или сеть: возвращаем прежние записи —
      // узлы переносились целиком, их onclick-обработчики живы
      syncOn(false);
      list.innerHTML = '';
      prevNodes.forEach(function(n){ list.appendChild(n); });
      fail(e);
    });

  /** Действие из ленты: vac|extra|reg (админ), exask|annack (все). */
  function ntfAct(action, approve){
    const p = action.split(':');
    const id = p.slice(1).join(':');
    haptic(); syncOn(true);
    const doneAdm = function(a2){
      syncOn(false); toast('✓');
      // Сервер вернул свежую ленту прямо в ответе решения — рендерим её без
      // отдельного notifs-вызова; старый сервер (без feed) — прежний путь.
      if (a2 && a2.feed) renderFeed(a2.feed);
      else loadNotifs();
      load(true); // один фоновый вызов: сверка state/бейджа
      if (ADM) renderAdmin(a2);
    };
    const doneSt = function(st){
      syncOn(false);
      if (st && st.notice) toast(st.notice); else toast('✓');
      const fd = st && st.feed ? st.feed : null;
      if (fd) { try { delete st.feed; } catch (e3) {} } // ленту не кэшируем в tb_state
      render(st);
      if (fd) renderFeed(fd);
      else loadNotifs(); // старый сервер без feed — прежний путь
    };
    const err2 = function(e){ syncOn(false); fail(e); };
    if (p[0] === 'vac') rpc('appAdminDecide', [UID, TOKEN, id, approve, ''], doneAdm, err2);
    else if (p[0] === 'extra') rpc('appAdminExtraDecide', [UID, TOKEN, id, approve], doneAdm, err2);
    else if (p[0] === 'reg') rpc('appAdminRegDecide', [UID, TOKEN, id, approve], doneAdm, err2);
    else if (p[0] === 'exask') rpc('appEmpExtraRespond', [UID, TOKEN, id, approve], doneSt, err2);
    else if (p[0] === 'annack') rpc('appAnnAck', [UID, TOKEN, id], doneSt, err2);
  }

  // --- Скорость: локальный кэш состояния + мгновенный (optimistic) отклик ---
  function syncOn(v){ document.getElementById('sync').classList.toggle('on', !!v); }
  function cacheSave(st){
    try {
      var copy = {};
      for (var k in st) if (k !== 'avatar') copy[k] = st[k];
      localStorage.setItem('tb_state', JSON.stringify(copy));
      if (st.avatar) localStorage.setItem('tb_ava', st.avatar);
      else if (st.avatar === '') localStorage.removeItem('tb_ava');
    } catch (e) {}
  }
  function cacheLoad(){
    try { var s = localStorage.getItem('tb_state'); return s ? JSON.parse(s) : null; }
    catch (e) { return null; }
  }
  function hhmm(ms){
    var t2 = new Date(ms);
    return ('0' + t2.getHours()).slice(-2) + ':' + ('0' + t2.getMinutes()).slice(-2);
  }

  function load(bg){
    // Старт не блокирует UI даже без кэша: скелетон + sync-бар вместо
    // оверлея (#loadOv/busy остаются для форм: отпуск, назначения и т.п.).
    syncOn(true);
    // Аватар НИКОГДА не едет в ответе state (noava:1 всегда) — при пустом
    // кэше tb_ava его донесёт фоновый вызов avatar ниже.
    rpc('appState', [UID, TOKEN, 1], function(st){
      syncOn(false); render(st); fetchAvatar();
    }, function(e){ syncOn(false); fail(e); });
  }
  // Фоновая догрузка аватара: не блокирует ничего; при сбое/пустом ответе
  // (в т.ч. старый сервер без api avatar) молча остаются инициалы.
  var avaFetching = false;
  function fetchAvatar(){
    var have = '';
    try { have = localStorage.getItem('tb_ava') || ''; } catch (e) {}
    if (have || avaFetching) return;
    avaFetching = true;
    rpc('appAvatar', [UID, TOKEN], function(res){
      avaFetching = false;
      if (!res || !res.avatar) return;
      try { localStorage.setItem('tb_ava', res.avatar); } catch (e) {}
      const ava = document.getElementById('ava');
      ava.textContent = '';
      const ai = document.createElement('img');
      ai.src = res.avatar; ai.alt = '';
      ava.appendChild(ai);
    }, function(e){ avaFetching = false; });
  }
  function fail(err){
    busy(false);
    document.body.classList.remove('booting');
    toast(err && err.message ? err.message : d().connErr, true);
  }

  // Сменные действия просят у сервера «лёгкий» ответ (lite:1): без пересчёта
  // sched/vacations/myExtras — эти поля доносит merge из текущего состояния.
  var LITE_ACTS = { start_shift: 1, start_lunch: 1, end_lunch: 1, end_shift: 1 };
  function doAction(a, payload){
    haptic();
    var prev = null;
    if (a === 'vacation') {
      busy(true);
    } else if (S) {
      // Мгновенный локальный переход; сервер догоняет в фоне
      prev = S;
      var now = Date.now(), o = {};
      for (var k in S) o[k] = S[k];
      delete o.avatar;
      if (a === 'start_shift') { o.state = 'OPEN'; o.shiftStartMs = now; o.shiftStart = hhmm(now); o.lunchTotalMs = 0; }
      else if (a === 'start_lunch') { o.state = 'ON_LUNCH'; o.lunchStartMs = now; o.lunchStart = hhmm(now); }
      else if (a === 'end_lunch') { o.state = 'OPEN'; o.lunchTotalMs = (o.lunchTotalMs || 0) + (now - (o.lunchStartMs || now)); }
      else if (a === 'end_shift') { o.state = 'NONE'; }
      render(o);
      syncOn(true);
    }
    // lite — только когда есть полное состояние-база для merge (S); иначе
    // и для 'vacation' сервер отвечает полным state, как раньше
    var lite = (LITE_ACTS[a] && S) ? 1 : 0;
    rpc('appAction', [UID, TOKEN, a, payload || null, lite], function(st){
      syncOn(false);
      if (st && st.lite && S) {
        // Лёгкий ответ: накладываем пришедшие поля поверх текущего состояния;
        // sched/vacations/myExtras и прочие отсутствующие поля остаются от
        // старого (кэш никогда не потеряет их из-за lite). Одноразовые
        // notice/avatar из базы не тащим, маркер lite в render/кэш не пускаем.
        var m = {};
        for (var mk in S) m[mk] = S[mk];
        delete m.notice; delete m.avatar;
        for (var rk in st) m[rk] = st[rk];
        delete m.lite;
        st = m;
      }
      // Без маркера (старый сервер в раскатке / vacation) — замена целиком
      render(st);
      if (st.notice) toast(st.notice);
    }, function(e){
      syncOn(false);
      if (prev) render(prev);
      fail(e);
    });
  }

  function setLang(l){
    if (l === LNG) return;
    haptic(); busy(true);
    rpc('appSetLang', [UID, TOKEN, l], function(st){
      render(st);
      // «Лента» и «Админ» рисуются при заходе на вкладку — после смены языка
      // перерисовываем их из последних payload'ов, без запросов к серверу
      // (тексты записей ленты остаются на языке записи — это данные)
      if (ADM) renderAdmin(ADM);
      if (FEED) renderFeed(FEED);
    }, fail);
  }

  function initials(name){
    return String(name || '–').split(/\s+/).slice(0, 2)
      .map(function(w){ return w.charAt(0).toUpperCase(); }).join('');
  }

  function render(st){
    S = st; busy(false);
    document.body.classList.remove('booting'); // скелетон холодного старта
    LNG = st.lang === 'en' ? 'en' : 'ru';
    applyStatic();
    document.getElementById('name').textContent = st.name;
    document.getElementById('ava').textContent = initials(st.name);
    document.getElementById('today').textContent = st.today;
    document.getElementById('week').textContent = st.week;
    document.getElementById('shifts').textContent = st.weekShifts;

    const pill = document.getElementById('pill'), tx = document.getElementById('pillTx');
    const tsub = document.getElementById('tsub'), act = document.getElementById('actions');
    act.innerHTML = '';
    const B = function(cls, imgKey, label, action, confirm){
      const b = document.createElement('button');
      b.className = 'btn ' + cls;
      b.innerHTML =
        '<span class="bic"><img src="' + IMGS[imgKey] + '" alt=""></span>' +
        '<span class="lbl">' + label + '</span>' +
        '<svg class="ic chev" viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg>';
      b.onclick = confirm
        ? function(){ showConfirm(d().cTitle, function(){ doAction(action); },
            null, null, d().cLunch); }
        : function(){ doAction(action); };
      act.appendChild(b);
    };

    if (st.state === 'OPEN') {
      pill.className = 'pill st-open'; tx.textContent = d().onShift;
      tsub.textContent = d().sinceShift + st.shiftStart + ' · ' + d().ofTarget + st.targetH + 'h';
      startTimer(st.shiftStartMs, st.lunchTotalMs || 0, 'url(#gGreen)');
      B('b-amber', 'coffee', d().bLunch, 'start_lunch');
      B('b-red', 'stop', d().bEnd, 'end_shift', true);
    } else if (st.state === 'ON_LUNCH') {
      pill.className = 'pill st-lunch'; tx.textContent = d().lunch;
      tsub.textContent = d().sinceLunch + st.lunchStart;
      startTimer(st.lunchStartMs, 0, 'url(#gAmber)');
      // Во время обеда завершить смену нельзя — только завершить обед
      B('b-green', 'play', d().bEndLunch, 'end_lunch');
    } else {
      pill.className = 'pill st-none'; tx.textContent = d().off;
      tsub.textContent = d().idle;
      stopTimer();
      document.getElementById('timer').textContent = '–:––';
      setRing(0, '#e4e7ec');
      B('b-green', 'play', d().bStart, 'start_shift');
    }

    // Вкладка «Админ» — только для role=admin; бейдж = ожидающие решения
    document.getElementById('tabAdm').style.display = st.isAdmin ? 'flex' : 'none';
    const nb = document.getElementById('ntfBadge');
    if (st.unreadNotifs) {
      nb.textContent = st.unreadNotifs;
      nb.style.display = 'flex';
    } else {
      nb.style.display = 'none';
    }

    // «Мои смены» из «Графика» (ближайшие дни; сегодняшняя подсвечена)
    const sc = document.getElementById('schedCard');
    const sl = document.getElementById('schedList');
    if (st.sched && st.sched.length) {
      sc.style.display = 'block';
      sl.innerHTML = '';
      const todayDs = (function(){
        const n2 = new Date();
        return n2.getFullYear() + ('0' + (n2.getMonth() + 1)).slice(-2) + ('0' + n2.getDate()).slice(-2);
      })();
      st.sched.forEach(function(s2){
        // Данные из ячеек листа — только textContent, никакого innerHTML
        const r = document.createElement('div');
        r.className = 'srow' + (s2.ds === todayDs ? ' today' : '');
        // «ожидает» — канонический маркер заметки с сервера (инвариант 8), не локализуется
        const wait = s2.note && s2.note.indexOf('ожидает') !== -1;
        const left = document.createElement('span');
        left.textContent = (s2.ex ? (wait ? '➕⏳ ' : '➕ ') : '') + s2.d +
          (s2.ds === todayDs ? ' · ' + d().schedToday : '');
        const right = document.createElement('b');
        right.textContent = s2.s + '–' + s2.e;
        r.appendChild(left); r.appendChild(right);
        sl.appendChild(r);
      });
    } else {
      sc.style.display = 'none';
    }

    // Мои запросы на доп. смены в ожидании
    const em = document.getElementById('exMine');
    em.innerHTML = '';
    (st.myExtras || []).forEach(function(x){
      const r = document.createElement('div');
      r.className = 'srow';
      const l3 = document.createElement('span'); l3.textContent = '⏳ ' + x.d;
      const r3 = document.createElement('b'); r3.textContent = x.s + '–' + x.e;
      r.appendChild(l3); r.appendChild(r3);
      em.appendChild(r);
    });

    // Аватар: пришедший / из локального кэша / инициалы
    const ava = document.getElementById('ava');
    let avaSrc = st.avatar;
    if (avaSrc === undefined) { try { avaSrc = localStorage.getItem('tb_ava') || ''; } catch (e) { avaSrc = ''; } }
    if (avaSrc) {
      ava.textContent = '';
      const ai = document.createElement('img');
      ai.src = avaSrc; ai.alt = '';
      ava.appendChild(ai);
    } else {
      ava.textContent = initials(st.name);
    }

    // Иллюстрация по выбранному типу отпуска (no-op до первого открытия вкладки)
    setVacArt();

    const types = document.getElementById('types'); types.innerHTML = '';
    if (!vacType && st.types && st.types.length) vacType = st.types[0].v;
    (st.types || []).forEach(function(tp){
      const c = document.createElement('div');
      c.className = 'chip' + (tp.v === vacType ? ' on' : '');
      c.textContent = tp.l;
      c.onclick = function(){ vacType = tp.v; render(S); };
      types.appendChild(c);
    });

    const vl = document.getElementById('vlist'); vl.innerHTML = '';
    if (!st.vacations || !st.vacations.length) {
      vl.innerHTML = '<div class="empty">' + d().noReq + '</div>';
    } else {
      st.vacations.forEach(function(v){
        const r = document.createElement('div');
        r.className = 'vrow';
        const left = document.createElement('span');
        left.textContent = v.id + ' · ' + v.period;
        const st2 = document.createElement('span');
        st2.className = 'vst ' + v.status; // класс — сырой enum: CSS .vst.Pending и т.д.
        st2.textContent = d()['st' + v.status] || v.status;
        r.appendChild(left); r.appendChild(st2);
        vl.appendChild(r);
      });
    }

    cacheSave(st);
  }

  function setRing(frac, color){
    const fg = document.getElementById('ringFg');
    fg.style.stroke = color;
    fg.style.strokeDashoffset = String(CIRC * (1 - Math.min(1, Math.max(0, frac))));
  }

  function startTimer(fromMs, minusMs, color){
    stopTimer();
    if (!fromMs) return;
    const tick = function(){
      let ms = Date.now() - fromMs - (minusMs || 0);
      if (ms < 0) ms = 0;
      const h = Math.floor(ms / 3600000), m = Math.floor(ms % 3600000 / 60000);
      document.getElementById('timer').textContent = h + ':' + (m < 10 ? '0' : '') + m;
      const target = (S && S.targetH ? S.targetH : 8) * 3600000;
      setRing(S && S.state === 'ON_LUNCH' ? 1 : ms / target, color);
    };
    tick(); timerInt = setInterval(tick, 1000); // чистая локальная математика
  }
  function stopTimer(){ if (timerInt) { clearInterval(timerInt); timerInt = null; } }

  // Общий confirm-модал: сообщение + отложенный callback; подписи кнопок
  // необязательны (по умолчанию — тексты завершения смены, как раньше).
  var confirmCb = null;
  function showConfirm(message, onOk, okLabel, noLabel, sub){
    confirmCb = onOk || null;
    document.getElementById('cTitle').textContent = message || d().cTitle;
    document.getElementById('confirmSub').textContent = sub || '';
    document.getElementById('cYes').textContent = okLabel || d().cYes;
    document.getElementById('cNo').textContent = noLabel || d().cNo;
    document.getElementById('confirmOv').classList.add('show');
  }
  function confirmOk(){
    var cb = confirmCb;
    hideConfirm();
    if (cb) cb();
  }
  function hideConfirm(){
    confirmCb = null;
    document.getElementById('confirmOv').classList.remove('show');
  }

  const d1 = document.getElementById('d1'), d2 = document.getElementById('d2');
  function countDays(){
    const el = document.getElementById('days');
    if (d1.value && d2.value) {
      const n = Math.round((new Date(d2.value) - new Date(d1.value)) / 86400000) + 1;
      el.textContent = n > 0 ? d().daysN + n : d().daysBad;
    } else el.textContent = '';
  }
  d1.onchange = function(){ if (!d2.value || d2.value < d1.value) d2.value = d1.value; countDays(); };
  d2.onchange = countDays;
  const today = new Date().toISOString().slice(0, 10);
  d1.min = today; d2.min = today;
  document.getElementById('exDate').min = today;

  function toggleBox(boxId, btnId){
    haptic();
    const b = document.getElementById(boxId);
    const open = b.style.display === 'none';
    b.style.display = open ? 'block' : 'none';
    document.getElementById(btnId).textContent = open ? '−' : '+';
  }

  function sendExtra(){
    const dt = document.getElementById('exDate').value;
    const s = document.getElementById('exStart').value;
    const e2 = document.getElementById('exEnd').value;
    if (!dt || !s || !e2) return toast(d().admPick, true);
    haptic(); busy(true);
    rpc('appExtraRequest', [UID, TOKEN, {
      date: dt, start: s, end: e2,
      note: document.getElementById('exNote').value.trim(),
    }], function(st){
      render(st);
      if (st.notice) toast(st.notice);
      document.getElementById('exNote').value = '';
      document.getElementById('exDate').value = '';
      document.getElementById('extraForm').style.display = 'none';
      document.getElementById('exPlus').textContent = '+';
    }, fail);
  }

  function sendVacation(){
    if (!d1.value || !d2.value) return toast(d().pickDates, true);
    doAction('vacation', {
      type: vacType, start: d1.value, end: d2.value,
      reason: document.getElementById('reason').value.trim(),
    });
    document.getElementById('reason').value = ''; d1.value = ''; d2.value = ''; countDays();
  }

  // Загрузка своей аватарки: тап по кружку → выбор фото → квадрат 256px → сервер
  document.getElementById('ava').onclick = function(){
    document.getElementById('avaFile').click();
  };
  document.getElementById('avaFile').onchange = function(e){
    const f = e.target.files && e.target.files[0];
    e.target.value = '';
    if (!f) return;
    const img = new Image();
    img.onload = function(){
      const SZ = 256;
      const c = document.createElement('canvas');
      c.width = SZ; c.height = SZ;
      const side = Math.min(img.width, img.height);
      c.getContext('2d').drawImage(img,
        (img.width - side) / 2, (img.height - side) / 2, side, side, 0, 0, SZ, SZ);
      URL.revokeObjectURL(img.src);
      busy(true);
      rpc('appSetAvatar', [UID, TOKEN, c.toDataURL('image/jpeg', 0.85)], render, fail);
    };
    img.src = URL.createObjectURL(f);
  };

  applyStatic();
  // Иллюстрация отпуска на старте НЕ грузится: src появится при первом
  // открытии вкладки «Отпуск» (setVacArt). Если файл недоступен (web-сборка,
  // 404) — прячем img, чтобы не оставлять «сломанную» иконку; при удачной
  // загрузке (в т.ч. после смены типа) возвращаем на место.
  (function(){
    var vim = document.getElementById('vacArtImg');
    vim.onerror = function(){ vim.style.display = 'none'; };
    vim.onload = function(){ vim.style.display = ''; };
  })();
  // Возврат в приложение после долгой паузы (>60 с) — тихая фоновая сверка
  var hiddenAt = 0;
  document.addEventListener('visibilitychange', function(){
    if (document.hidden) { hiddenAt = Date.now(); return; }
    var away = hiddenAt ? Date.now() - hiddenAt : 0;
    hiddenAt = 0;
    if (away > 60000) load(true);
  });
  // Мгновенный старт: рендерим прошлое состояние из кэша, сервер догоняет в
  // фоне; без кэша — статичный каркас со скелетоном вместо блокирующего спиннера
  (function boot(){
    var cached = cacheLoad();
    if (cached) { render(cached); load(true); }
    else { document.body.classList.add('booting'); load(false); }
  })();
</script>
</body>
</html>
